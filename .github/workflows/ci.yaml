name: Build rustup Windows

on:
  workflow_dispatch:
    inputs:
      rustup_commit:
        description: "Rustup commit SHA / branch / tag to build"
        required: true
        default: "999abea4"

jobs:
  build-windows:
    name: build-${{ matrix.target }}
    runs-on: windows-latest

    env:
      RUSTFLAGS: -Ctarget-feature=+crt-static
      RUST_MIN_STACK: 16777216
      RUSTUP_COMMIT: ${{ github.event.inputs.rustup_commit }}

    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout requested rustup commit
        shell: bash
        run: |
          echo "Requested commit: $RUSTUP_COMMIT"
          git fetch origin "$RUSTUP_COMMIT"
          git checkout "$RUSTUP_COMMIT"
          echo "Building commit:"
          git rev-parse HEAD

      - name: Prep cargo dirs
        shell: powershell
        run: |
          New-Item "${env:USERPROFILE}\.cargo\registry" -ItemType Directory -Force
          New-Item "${env:USERPROFILE}\.cargo\git" -ItemType Directory -Force

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Install Rustup
        shell: powershell
        run: |
          $ProgressPreference = "SilentlyContinue"
          Invoke-WebRequest "https://win.rustup.rs/x86_64" -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-host=x86_64-pc-windows-msvc --profile=minimal
          del rustup-init.exe

      - name: Add cargo to PATH
        shell: powershell
        run: |
          echo "$env:USERPROFILE\.cargo\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Update stable toolchain
        shell: bash
        run: rustup update stable

      - name: Install target
        shell: bash
        run: rustup target install ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: windows-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build rustup
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: rustup-init-${{ matrix.target }}-${{ env.RUSTUP_COMMIT }}
          path: target/${{ matrix.target }}/release/rustup-init.exe
          retention-days: 7